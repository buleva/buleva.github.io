<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="css/main.css" rel='stylesheet'>
        <script src='js/scripts.js'></script>
    </head>
    <body onload='onloadIndex()'>
        <div class='grid_container' id='container_index'>
            <div class='grid_box' id='header_box'>
                <a href='html/settings.html'><img class='nav_img' id='settings_img' src='pictures/gear.png' alt='settings'/></a>
                <a href='html/info.html'><img class='nav_img' id='info_img' src='pictures/info.png' alt='info'/></a>
                <a href='index.html'><img id='logo_img' src='pictures/pitch_logo.png' alt='pitch_logo'/></a>
            </div>
            <div class='grid_box' id='left_box'></div>
            <div class='grid_box' id='feedback_box'><img id='feedback_img'/></div>
            <div class='grid_box' id='button_box'>
                <button class='button' onclick="repeat()">repeat</button>
                <button class='button' onclick='lower()'>lower</button>
                <button class='button' id='equalButton' onclick='equal()'>equal</button>
                <button class='button' onclick='higher()'>higher</button>
                <button class='button' onclick='next()'>next</button>
            </div>
            <div class='grid_box' id='right_box'></div>
            <div class='grid_box' id='footer_box'></div>
        </div>
    </body>
</html>
