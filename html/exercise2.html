<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/main.css" rel='stylesheet'>
        <script src='../js/scripts.js'></script>
        <script src="../js/exercise2.js"></script>
        <link rel="icon" type="image/x-icon" href="../pictures/icon.png">
    </head>
    <body onload='onloadEx()'>
        <div class='grid_container' id='container_exercise2'>
            <div class='grid_box' id='header_box'>
                <a href='settings_exercise2.html'><img class='nav_img' id='settings_img' src='../pictures/gear_invert.png' alt='settings'/></a>
                <a href='info_exercise2.html'><img class='nav_img' id='info_img' src='../pictures/info_invert.png' alt='info'/></a>
                <a href='../index.html'><img id='logo_img' src='../pictures/pitch_logo.png' alt='pitch_logo'/></a>
            </div>
            <div class='grid_box' id='left_box'></div>
            <div class='grid_box' id='feedback_box'><img id='feedback_img'/></div>
            <div class='grid_box' id='button_box'>
                <button class='button' onclick="repeatExercise2()">repeat</button>
                <button class='button' onclick='lower()'>lower</button>
                <button class='button' id='equalButton' onclick='equal()'>equal</button>
                <button class='button' onclick='higher()'>higher</button>
                <button class='button' onclick='nextExercise2()'>next</button>
            </div>
            <div class='grid_box' id='right_box'></div>
            <div class='grid_box' id='footer_box'></div>
        </div>
    </body>
</html>
