<!DOCTYPE html>
<html> 
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="../css/main.css" rel='stylesheet'>
        <script src='../js/scripts.js'></script>
        <script src="../js/exercise1.js"></script>
    </head>
    <body onload="onloadSettings()">
        <div class='grid_container' id='container_settings_exercise'>
            <div class='grid_box' id='header_box'>
                <a href='exercise1.html'><img class='nav_img' id='settings_img' src='../pictures/gear.png' alt='settings'/></a>
                <a href='info_exercise1.html'><img class='nav_img' id='info_img' src='../pictures/info_invert.png' alt='info'/></a>
                <a href='../index.html'><img id='logo_img' src='../pictures/pitch_logo.png' alt='pitch_logo'/></a>
            </div>
            <div class='grid_box' id='left_box'></div>
            <div class='grid_box' id="level_box">
                <button class='button' id="level1" onclick='levelButton(1, 0.3, false, 50, 1)'>level1</button>
                <button class='button' id="level2" onclick='levelButton(1, 0.5, false, 30, 2)'>level2</button>
                <button class='button' id="level3" onclick='levelButton(0.8, 0.7, true, 20, 3)'>level3</button>
                <button class='button' id="level4" onclick='levelButton(0.7, 1, true, 10, 4)'>level4</button>
            </div>
            <div class='grid_box' id="settings_box">
                <div class='settings_element_box'>
                    <p>length of the notes: </p>
                    <input id='tone_length_input_field' type="number" inputmode='decimal' pattern="\d*" min="0.1" max="5" step="0.1" onchange="toneLengthFieldInput(0.1, 5)">
                    <input id='tone_length_slider' type='range' min='0.1' max='5' step='0.1' oninput='toneLengthSliderInput()'>
                </div>
                <div class='settings_element_box'>
                    <p>length of the pause: </p>
                    <input id='pause_length_input_field' type="number" inputmode='decimal' pattern="\d*" min="0" max="2" step="0.1" onchange="pauseLengthFieldInput(0, 2)">
                    <input id='pause_length_slider' type='range' min='0' max='2' step='0.1' oninput='pauseLengthSliderInput()'>
                </div>
                <div class='settings_element_box'>
                    <p>volume: </p>
                    <input id='volume_input_field' type="number" inputmode='numeric' pattern="\d*" min="0" max="100" step="1" onchange="volumeFieldInput(0, 100)">
                    <input id='volume_slider' type='range' min='0' max='100' step='1' oninput='volumeSliderInput()'>
                </div>
                <div class='settings_element_box'>
                    <p>notes can be the same</p>
                    <input class='checkbox' id='checkbox_equal_tones' type="checkbox" oninput='equalTonesCheckboxInput()'>  
                </div>
                <div class='settings_element_box'>
                    <p>play soundeffects</p>
                    <input class='checkbox' id='checkbox_soundeffects' type="checkbox" oninput='soundeffectCheckboxInput()'>
                </div>
                <div class='settings_element_box'>
                    <p>tone difference</p>
                    <select id='dropdown_interval_size' onchange='dropdownIntervalSizeInput()'>
                        <option value='50'>50ct</option>
                        <option value='30'>30ct</option>
                        <option value='20'>20ct</option>
                        <option value='10'>10ct</option>
                        <option value='5'>5ct</option>
                        <option value='3'>3ct</option>
                    </select>
                </div>
                <div class='settings_element_box'>
                    <p>waveform</p>
                    <select id='dropdown_waveform' onchange='dropdownWaveformInput()'>
                        <option value='sine'>sine</option>
                        <option value='triangle'>triangle</option>
                        <option value='sawtooth'>sawtooth</option>
                        <option value='square'>square</option>
                    </select>
                </div>
            </div>
            <div class='grid_box' id='right_box'></div>
            <div class='grid_box' id='footer_box'></div>
        </div>
    </body>
</html>
